services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.16.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        echo "Waiting for DB..."
        sleep 10

        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama

        exec /nakama/nakama \
          --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama \
          --logger.level DEBUG
    ports:
      - "7350:7350"
      - "7351:7351"
    depends_on:
      - postgres